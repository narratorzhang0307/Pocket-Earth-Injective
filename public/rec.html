<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Pocket Earth · 录制台</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #ffffff; overflow: hidden; }
  body { display: flex; align-items: center; justify-content: center; }

  /* 16:9 舞台：白底 + 极淡径向渲染，手机居中 letterbox */
  .stage {
    position: relative;
    width: min(100vw, 177.78vh);
    height: min(56.25vw, 100vh);
    background: #ffffff;
    display: flex; align-items: center; justify-content: center;
  }

  /* vivo 薄框手机壳（边框更细：padding 5px） */
  .phone {
    position: relative;
    height: 90%;
    aspect-ratio: 9 / 19.5;
    background: #0b0b0c;
    border-radius: 44px;
    padding: 5px;
    box-shadow:
      0 52px 92px -22px rgba(22, 22, 34, .30),
      0 20px 44px -14px rgba(22, 22, 34, .20),
      0 2px 6px rgba(0, 0, 0, .10);
  }
  /* 顶部挖孔摄像头 */
  .cam {
    position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
    width: 8px; height: 8px; border-radius: 50%;
    background: #000; box-shadow: 0 0 0 2px #18181a;
    z-index: 3; pointer-events: none;
  }
  /* 屏幕：同源嵌 localhost（更细边框对应更大屏幕圆角） */
  .screen {
    width: 100%; height: 100%;
    border: 0; border-radius: 40px;
    background: #EAEAEA; display: block;
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="phone">
      <div class="cam"></div>
      <iframe class="screen" title="Pocket Earth" src="/?demo"
        allow="clipboard-read; clipboard-write; camera; microphone"></iframe>
    </div>
  </div>
</body>
</html>
